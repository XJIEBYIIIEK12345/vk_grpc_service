syntax = "proto3";

option java_package = "com.xjiebyiiiek12345.vk";
option java_outer_classname = "VkProto";

service Vk {
  rpc Put (PutRequest) returns (PutReply) {}
  rpc Get (GetRequest) returns (GetReply) {}
  rpc Delete (DeleteRequest) returns (DeleteReply) {}
  rpc Range (RangeRequest) returns (stream RangeReply) {}
  rpc Count (CountRequest) returns (CountReply) {}
}

message PutRequest {
  string key = 1;
  bytes value = 2;
}

message PutReply {
  bool success = 1;
  string message = 2;
}

message GetRequest {
  string key = 1;
}

message GetReply {
  string key = 1;
  bytes value = 2;
  bool found = 3;
}

message DeleteRequest {
  string key = 1;
}

message DeleteReply {
  bool success = 1;
  string message = 2;
}

message RangeRequest {
  string key_begin = 1;
  string key_end = 2;
}

message RangeReply {
  string key = 1;
  bytes value = 2;
}

message CountRequest {
}

message CountReply {
  int64 count = 1;
}